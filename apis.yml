features:
  - name: AI Order Capture (OrderAgent)
    description: >-
      Processes multimodal inputs — emails, SMS, images, and documents — and
      converts them into structured, ERP-ready orders for distributors.
  - name: Voice Ordering (VoiceAgent)
    description: >-
      A voice ordering agent built on OpenAI's Realtime API that lets customers
      place orders naturally over the phone with sub-second latency, including
      outside business hours.
  - name: Unified Supplier Messaging
    description: >-
      Restaurateurs place orders and chat with all of their suppliers in one
      app, with orders converted into each supplier's preferred format.
  - name: Order Format Conversion
    description: >-
      Outbound orders are delivered to suppliers via email, WhatsApp, text,
      fax, or direct ERP integration.
