aid: choco
name: Choco
description: >-
  Choco is an AI-powered digital ordering platform that simplifies how
  restaurants order from their food suppliers and distributors. Serving tens of
  thousands of distributors and over one hundred thousand buyers across the US,
  UK, Europe, and the GCC, Choco lets restaurateurs place orders and chat with
  all their suppliers in one app while converting orders into a supplier's
  preferred format (email, WhatsApp, text, fax, or direct ERP integration).
  Choco connects to supplier ERP systems such as Entree, NetSuite, QuickBooks,
  Microsoft Dynamics, Target Data System, NCR, Sage, and Odoo, and uses AI —
  including OrderAgent for multimodal order capture and VoiceAgent built on
  OpenAI's Realtime API — to turn emails, texts, images, and documents into
  structured, ERP-ready orders. Choco does not publish a public developer API;
  integration is delivered through managed ERP connections, and its public
  GitHub organization (chocoapp) hosts only internal data-engineering and
  infrastructure tooling rather than client SDKs or API specifications.
