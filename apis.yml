aid: choco
name: Choco
description: >-
  Choco is an AI-powered digital ordering platform that simplifies how
  restaurants order from their food suppliers and distributors. Serving tens of
  thousands of distributors and over one hundred thousand buyers across the US,
  UK, Europe, and the GCC, Choco lets restaurateurs place orders and chat with
  all their suppliers in one app while converting orders into a supplier's
  preferred format. Choco connects to supplier ERP systems such as NetSuite,
  QuickBooks, Microsoft Dynamics, Sage, and Odoo, and uses AI to turn emails,
  texts, images, and documents into structured, ERP-ready orders. Choco does
  not appear to publish a public developer API; integration is delivered
  through its ERP connections.
